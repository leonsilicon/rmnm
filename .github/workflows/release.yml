name: Release

# Manually cut a release. Pick the semver bump (or an exact version); this bumps
# the main package AND every per-platform npm/* sub-package to the same version,
# commits it with a bare-semver message, and pushes to main. The CI workflow's
# `publish` job detects that bare-semver commit and publishes everything to npm
# once all platform builds + tests pass.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: bun install
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version (main + all npm sub-packages)
        run: |
          # Bump the root package.json without creating npm's own tag/commit.
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          NEW_VERSION=${NEW_VERSION#v}
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          # `napi version` rewrites every npm/* sub-package version and the main
          # package's optionalDependencies to match the root version.
          bunx napi version
      - name: Commit and push
        run: |
          git add -A
          # Bare-semver commit message is the signal the CI publish job matches.
          git commit -m "$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
